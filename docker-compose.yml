services:
  sentinel:
    build: .
    container_name: sentinel-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - sentinel_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/sentinel.db
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sentinel_data:
    driver: local
